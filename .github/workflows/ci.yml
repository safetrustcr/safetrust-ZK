name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @safetrust/zk-sdk build
      - run: pnpm --filter safetrust-zk-demo lint

  noir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Noir
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
          noirup
      - name: Install Barretenberg
        run: |
          curl -L https://raw.githubusercontent.com/AztecProtocol/aztec-packages/refs/heads/next/barretenberg/bbup/install | bash
          echo "$HOME/.bb" >> $GITHUB_PATH
          bbup
      - name: Compile all circuits
        run: make compile-all
      - name: Run circuit unit tests
        run: make test-circuits
      - name: Smoke test proof_of_funds prove/verify
        run: make prove-proof-of-funds
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @safetrust/zk-sdk test

  soroban:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Noir (beta.9 for Stellar fixtures)
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
          noirup -v 1.0.0-beta.9
      - name: Build Stellar verifier fixtures
        run: make prepare-verifier-fixtures
      - name: Test escrow_verifier
        run: cargo test
        working-directory: contracts/escrow_verifier
